<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard Debug</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/mobile.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        .loading { color: orange; }
        button { padding: 10px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body class="bg-gray-50">
    {% set page_title = "Debug" %}
    {% include 'partials/app_nav_bar_standalone.html' %}
    <div class="max-w-3xl mx-auto px-4 py-6 app-main-safe">
    <h1>Dashboard Debug Page</h1>
    
    <div class="debug-section">
        <h2>API Tests</h2>
        <button onclick="testBotStatus()">Test Bot Status</button>
        <button onclick="testPortfolio()">Test Portfolio</button>
        <button onclick="testTrades()">Test Trades</button>
        <div id="api-results"></div>
    </div>
    
    <div class="debug-section">
        <h2>JavaScript Tests</h2>
        <button onclick="testDashboardInit()">Test Dashboard Init</button>
        <button onclick="testElementIDs()">Test Element IDs</button>
        <div id="js-results"></div>
    </div>
    
    <div class="debug-section">
        <h2>Console Logs</h2>
        <div id="console-logs"></div>
    </div>
    </div>

    <script>
        // Capture console logs
        const originalLog = console.log;
        const originalError = console.error;
        const logContainer = document.getElementById('console-logs');
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            const logEntry = document.createElement('div');
            logEntry.className = 'success';
            logEntry.textContent = 'LOG: ' + args.join(' ');
            logContainer.appendChild(logEntry);
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            const logEntry = document.createElement('div');
            logEntry.className = 'error';
            logEntry.textContent = 'ERROR: ' + args.join(' ');
            logContainer.appendChild(logEntry);
        };

        async function testBotStatus() {
            const results = document.getElementById('api-results');
            results.innerHTML = '<div class="loading">Testing bot status...</div>';
            
            try {
                const response = await fetch('/api/bot-status');
                const data = await response.json();
                results.innerHTML = `
                    <div class="success">Bot Status API Working!</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                results.innerHTML = `<div class="error">Bot Status API Error: ${error.message}</div>`;
            }
        }

        async function testPortfolio() {
            const results = document.getElementById('api-results');
            results.innerHTML = '<div class="loading">Testing portfolio...</div>';
            
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();
                results.innerHTML = `
                    <div class="success">Portfolio API Working!</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                results.innerHTML = `<div class="error">Portfolio API Error: ${error.message}</div>`;
            }
        }

        async function testTrades() {
            const results = document.getElementById('api-results');
            results.innerHTML = '<div class="loading">Testing trades...</div>';
            
            try {
                const response = await fetch('/api/trades?limit=5');
                const data = await response.json();
                results.innerHTML = `
                    <div class="success">Trades API Working!</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                results.innerHTML = `<div class="error">Trades API Error: ${error.message}</div>`;
            }
        }

        function testDashboardInit() {
            const results = document.getElementById('js-results');
            results.innerHTML = '<div class="loading">Testing dashboard initialization...</div>';
            
            try {
                // Test if dashboard class exists
                if (typeof EnhancedDashboard !== 'undefined') {
                    results.innerHTML = '<div class="success">EnhancedDashboard class found!</div>';
                } else {
                    results.innerHTML = '<div class="error">EnhancedDashboard class not found!</div>';
                }
            } catch (error) {
                results.innerHTML = `<div class="error">Dashboard Init Error: ${error.message}</div>`;
            }
        }

        function testElementIDs() {
            const results = document.getElementById('js-results');
            const requiredElements = [
                'total-balance',
                'available-balance', 
                'total-pnl',
                'daily-pnl',
                'open-trades',
                'total-unrealized-pnl',
                'win-rate',
                'total-trades-count',
                'daily-opened-trades',
                'daily-closed-trades',
                'bot-trading-status',
                'bot-cycle-count',
                'bot-uptime'
            ];
            
            let found = 0;
            let missing = [];
            
            requiredElements.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    found++;
                } else {
                    missing.push(id);
                }
            });
            
            results.innerHTML = `
                <div class="success">Found ${found}/${requiredElements.length} elements</div>
                ${missing.length > 0 ? `<div class="error">Missing: ${missing.join(', ')}</div>` : ''}
            `;
        }

        // Auto-run tests on page load
        window.addEventListener('load', () => {
            console.log('Debug page loaded');
            setTimeout(() => {
                testBotStatus();
                testPortfolio();
                testElementIDs();
            }, 1000);
        });
    </script>
    <script src="/static/js/mobile-nav.js"></script>
</body>
</html>
