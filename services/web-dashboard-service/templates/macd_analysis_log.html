<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>MACD Analysis Log - Trading Bot Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body class="bg-gray-50">
    {% set page_title = "MACD Analysis Log" %}
    {% include 'partials/app_nav_bar_standalone.html' %}

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="bg-white rounded-lg shadow-md p-4 sm:p-6 mb-4">
            <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 w-full">
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Exchange</label>
                        <input id="exchange" type="text" placeholder="binance" class="mt-1 w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Pair</label>
                        <input id="pair" type="text" placeholder="ETH/USDC" class="mt-1 w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Hours</label>
                        <input id="hours" type="number" min="1" max="720" value="24" class="mt-1 w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600">Limit</label>
                        <input id="limit" type="number" min="1" max="5000" value="200" class="mt-1 w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="applyBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-medium">
                        <i class="fas fa-filter mr-1"></i>Apply
                    </button>
                    <button id="refreshBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium">
                        <i class="fas fa-sync-alt mr-1"></i>Refresh
                    </button>
                </div>
            </div>
            <div id="meta" class="text-xs text-gray-500 mt-3"></div>
        </div>

        <div id="loading" class="text-center py-8 hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="mt-2 text-gray-600">Loading MACD analysis logs...</p>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 text-xs">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">log_ts</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">exchange</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">pair</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">hist_now</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">hist_prev</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">green_2bar_up</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">lookback</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">threshold</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">trigger</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">hist_candle_ts</th>
                        <th class="px-3 py-2 text-left font-semibold text-gray-600">rsi_window</th>
                    </tr>
                </thead>
                <tbody id="rows" class="divide-y divide-gray-100 bg-white"></tbody>
            </table>
        </div>
    </div>

    <script>
        function esc(v) {
            return String(v == null ? '' : v)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function fmt(n, d = 6) {
            const x = Number(n);
            return Number.isFinite(x) ? x.toFixed(d) : '—';
        }

        function boolTxt(v) {
            if (v === true) return 'true';
            if (v === false) return 'false';
            return '—';
        }

        async function loadMacdLogs() {
            document.getElementById('loading').classList.remove('hidden');
            const exchange = document.getElementById('exchange').value.trim();
            const pair = document.getElementById('pair').value.trim();
            const hours = document.getElementById('hours').value || '24';
            const limit = document.getElementById('limit').value || '200';
            const params = new URLSearchParams({ hours, limit });
            if (exchange) params.set('exchange', exchange);
            if (pair) params.set('pair', pair);

            try {
                const resp = await fetch('/api/v1/analytics/macd-analysis-logs?' + params.toString());
                if (!resp.ok) {
                    throw new Error('HTTP ' + resp.status);
                }
                const payload = await resp.json();
                const rows = Array.isArray(payload.rows) ? payload.rows : [];
                document.getElementById('meta').innerHTML =
                    `Showing <strong>${rows.length}</strong> rows` +
                    (exchange ? ` | exchange=<strong>${esc(exchange)}</strong>` : '') +
                    (pair ? ` | pair=<strong>${esc(pair)}</strong>` : '') +
                    ` | window=<strong>${esc(hours)}h</strong>`;
                const tbody = document.getElementById('rows');
                tbody.innerHTML = rows.map(r => `
                    <tr>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(r.log_ts || '—')}</td>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(r.exchange || '—')}</td>
                        <td class="px-3 py-2 whitespace-nowrap font-medium text-gray-800">${esc(r.pair || '—')}</td>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(fmt(r.hist_now))}</td>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(fmt(r.hist_prev))}</td>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(boolTxt(r.green_consecutive_increasing))}</td>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(r.lookback ?? '—')}</td>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(fmt(r.threshold, 2))}</td>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(boolTxt(r.trigger))}</td>
                        <td class="px-3 py-2 whitespace-nowrap">${esc(r.hist_candle_ts || '—')}</td>
                        <td class="px-3 py-2">${esc(Array.isArray(r.rsi_window) ? JSON.stringify(r.rsi_window) : '[]')}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('rows').innerHTML =
                    `<tr><td colspan="11" class="px-3 py-4 text-red-600">Failed loading MACD analysis logs</td></tr>`;
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        document.getElementById('applyBtn').addEventListener('click', loadMacdLogs);
        document.getElementById('refreshBtn').addEventListener('click', loadMacdLogs);
        loadMacdLogs();
    </script>
</body>
</html>
