<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>{% block title %}Trading Bot{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/mobile.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="app-top-nav bg-gradient-to-r from-indigo-600 to-purple-700 text-white shadow-lg sticky top-0 z-40" style="padding-top: env(safe-area-inset-top);">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-wrap items-center justify-between gap-y-2 min-h-[3.5rem] py-2 md:py-0 md:h-16 md:flex-nowrap">
                <div class="flex items-center min-w-0 flex-1 md:flex-initial pr-2">
                    <a href="/" class="app-nav-link text-white hover:text-blue-200 mr-2 flex-shrink-0" aria-label="Home">
                        <i class="fas fa-chart-line text-xl"></i>
                    </a>
                    <h1 class="text-lg md:text-xl font-bold truncate">{% block nav_brand %}Trading Bot{% endblock %}</h1>
                </div>
                <div class="flex items-center justify-end gap-2 flex-shrink-0">
                    {% include 'partials/app_nav_menu.html' %}
                </div>
            </div>
            {% include 'partials/app_nav_mobile_panel.html' %}
        </div>
    </nav>
    <main class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 app-main-safe">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/mobile-nav.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
