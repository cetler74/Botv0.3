alerts:
  channels:
    database: true
    email: false
    webhook: false
  enabled: true
  thresholds:
    api_error: 5
    balance_low: 50
    daily_loss: 0.05
    trade_failure: 3
balance_manager:
  check_interval_seconds: 30
  max_balance_usage: 0.9
  min_balance_threshold: 10
database:
  host: postgres
  max_overflow: 20
  name: trading_bot_futures
  options: -c search_path=trading,public
  password: mypassword
  pool_size: 10
  port: 5432
  user: carloslarramba
database_manager:
  backup_interval_hours: 24
  connection_timeout: 30
  max_retries: 3
  query_timeout: 60
exchange_manager:
  max_retries: 3
  rate_limit_delay: 0.1
  request_timeout: 30
  retry_delay: 1
exchanges:
  binance:
    base_currency: USDC
    market_type: spot
    max_pairs: 30
    min_volatility: 0.02
    min_volume_24h: 1000000
    sandbox: false
    websocket_url: wss://stream.binance.com:9443/ws/!ticker@arr
    websocket_private: wss://stream.binance.com:9443/ws
  bybit:
    base_currency: USDC
    market_type: spot
    max_pairs: 20
    min_volatility: 0.015
    min_volume_24h: 500000
    sandbox: false
    websocket_url: wss://stream.bybit.com/v5/public/spot
    websocket_private: wss://stream.bybit.com/v5/private
  cryptocom:
    base_currency: USD
    market_type: spot
    max_pairs: 20
    min_volatility: 0.005
    min_volume_24h: 500000
    sandbox: false
    websocket_url: wss://stream.crypto.com/v2/market
    websocket_private: wss://stream.crypto.com/v2/user
logging:
  backup_count: 5
  file: logs/trading_bot.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  max_file_size: 10485760
mcp:
  enabled: true
  perplexity:
    api_key: ''
    base_url: https://api.perplexity.ai
    cache:
      enabled: true
      max_size: 1000
      ttl_seconds: 3600
    features:
      news_analysis: true
      real_time_data: true
      web_scraping: true
      web_search: true
    max_retries: 3
    rate_limit_delay: 1.0
    scraping_settings:
      include_images: false
      include_links: true
      max_content_length: 50000
      timeout: 15
    search_settings:
      exclude_domains: []
      include_domains: []
      max_results: 10
      search_type: web
    timeout: 30
pair_selector:
  # SCALPING-OPTIMIZED PAIR SELECTION CONFIGURATION
  update_interval_minutes: 15  # Real-time updates for scalping (15min optimal)
  max_pairs_per_exchange: 15
  
  # Enhanced scoring weights for scalping
  scoring_weights:
    liquidity_score: 0.25      # Intraday liquidity (new)
    spread_tightness: 0.25     # Spread analysis (enhanced)
    volatility_suitability: 0.20  # Moderate volatility (enhanced)
    performance_metrics: 0.20  # Historical performance (new)
    volume_24h: 0.10           # Daily volume (reduced weight)
  
  # Scalping-optimized selection criteria
  selection_criteria:
    # Intraday liquidity requirements
    min_volume_1h: 100000      # Minimum 1-hour volume
    min_volume_15m: 25000      # Minimum 15-minute volume
    min_volume_5m: 10000       # Minimum 5-minute volume
    min_order_book_depth: 5000 # Minimum order book depth
    
    # Spread requirements (critical for scalping)
    max_spread_percentage: 0.5  # Maximum 0.5% spread for scalping
    max_spread_1h_avg: 0.3     # Maximum 1-hour average spread
    min_spread_consistency: 70  # Minimum spread consistency score
    
    # Advanced Order Book Requirements
    min_order_book_levels: 10   # Minimum number of order book levels
    max_order_book_imbalance: 2.0  # Maximum bid/ask volume imbalance ratio
    min_order_book_stability: 80   # Minimum order book stability score
    min_depth_at_0_1pct: 10000     # Minimum depth within 0.1% of mid price
    min_depth_at_0_5pct: 50000     # Minimum depth within 0.5% of mid price
    max_slippage_1000_usd: 0.1     # Maximum slippage for $1000 order
    min_liquidity_score: 75        # Minimum overall liquidity score
    
    # Volatility requirements (moderate volatility for scalping)
    min_volatility_15m: 0.2    # Minimum 15-minute volatility
    max_volatility_15m: 5.0    # Maximum 15-minute volatility
    optimal_volatility_range: [0.5, 3.0]  # Sweet spot for scalping
    min_volatility_consistency: 60  # Minimum volatility consistency
    
    # Execution requirements
    max_slippage_threshold: 0.3  # Maximum acceptable slippage
    min_execution_success_rate: 95  # Minimum execution success rate
    max_execution_time: 2.0     # Maximum execution time in seconds
    
    # Performance requirements
    min_win_rate: 60           # Minimum historical win rate
    min_profit_factor: 1.2     # Minimum profit factor
    max_drawdown: 10.0         # Maximum acceptable drawdown
    
    # Legacy criteria (maintained for compatibility)
    min_volume_24h: 2000000
    min_volatility: 0.015
    max_volatility: 0.08
    min_market_cap: 500000000
  
  # Enhanced blacklist system
  # PnL-FIX v10 (2026-04-20): Blacklist driven by 7-day PnL review.
  #   Repeat losers (>=2 trades, net -PnL):
  #     ONT/USDC   -$5.81  (2 trades, both losses)
  #     TRX/USDC   -$3.46  (2 trades, 1 SL@-1.58%)
  #     CHZ/USDC   -$1.48  (2 trades, net negative)
  #   Low-liquidity cryptocom small-caps causing SL overshoot (-3% to -5%
  #   exits on a -1.5% stop — market sell slippage on thin order books):
  #     AAVE/USD, API3/USD, ACT/USD, ARC/USD, ACS/USD
  #   Other cryptocom alphabetical-selector pollution (selector falls back
  #   to alphabetic order when ccxt `info.quoteVolume` is missing — these
  #   are the lowest-liquidity pairs showing up in analysis but unfit for
  #   spot scalping). Keeping as comments for audit; uncomment to enforce.
  blacklisted_pairs:
  - ONT/USDC
  - TRX/USDC
  - CHZ/USDC
  - AAVE/USD
  - API3/USD
  - ACT/USD
  - ARC/USD
  - ACS/USD
  # - ACX/USD
  # - ADI/USD
  # - AERGO/USD
  # - AERO/USD
  # - AEVO/USD
  # - AGENTFUN/USD
  # - AGLD/USD
  # - AIOZ/USD
  # - AIXBT/USD
  # - AKT/USD
  # - ALCX/USD
  # ACH/USD
  # CRO/USD removed for pair-specific optimization implementation
  # BNB/USDC  # EMERGENCY: Recent losses
  # XLM/USDC  # EMERGENCY: Recent losses
  
  # Enhanced replacement selection
  replacement_selection:
    enabled: true
    min_volume_24h_multiplier: 1.5
    min_market_cap_multiplier: 1.2
    exclude_new_listings_days: 28  # Extended to 4 weeks for stability
    min_listing_age_days: 30       # Minimum listing age for stability
    stability_check_enabled: true  # Enable stability checks
  
  # Performance tracking configuration
  performance_tracking:
    enabled: true
    metrics_retention_days: 90     # Keep 90 days of performance data
    trade_history_limit: 1000      # Keep last 1000 trades per pair
    update_frequency_minutes: 5    # Update performance metrics every 5 minutes
    min_trades_for_analysis: 10    # Minimum trades needed for analysis
  
  # Real-time monitoring
  real_time_monitoring:
    enabled: true
    liquidity_check_interval: 60   # Check liquidity every minute
    spread_check_interval: 30      # Check spreads every 30 seconds
    volatility_check_interval: 120 # Check volatility every 2 minutes
    performance_update_interval: 300 # Update performance every 5 minutes
