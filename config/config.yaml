          volume_threshold_percentage: 0.18  # CRO volume requirements
          candle_body_ratio: 0.7        # CRO candlestick pattern strength

strategies:
  regime_stability:
    enabled: true
    min_dwell_seconds: 180
    hysteresis_delta: 0.08
    emergency_volatility_score: 0.92
    # Trend persistence guard: require regime direction to hold across recent bars
    # before classifying as trending_up/down (reduces one-candle fake flips).
    trend_lookback_bars: 4
    trend_min_aligned_bars: 3
    require_latest_trend_alignment: true
    require_consecutive_trend_bars: false
  engulfing_multi_tf:
    # PnL-FIX v3 — engulfing now has a real `generate_signal` (previously always
    # returned 'hold'). Tightened all filters to match the new quality bar.
    enabled: true
    parameters:
      adx_entry_threshold: 22            # PnL-FIX v3: was 15 (chop). 22 = real trend
      adx_period: 14
      atr_multiplier_sl: 2.0
      atr_multiplier_tp: 3.0             # PnL-FIX v3: was 2.0 — 1:1.5 R:R minimum
      atr_period: 14
      confirmation_timeframes: 2         # PnL-FIX v3: was 1 — need multi-TF agreement
      cooldown_minutes: 60               # PnL-FIX v3: was 30 — avoid re-entries on chop
      fixed_sl_pct: 0.015                # PnL-FIX v3: aligned with new trading.stop_loss_percentage
      fixed_tp_pct: 0.030                # Strategy signal / metadata only; live exits use orchestrator trailing_stop
      max_trade_duration_hours: 12       # PnL-FIX v3: was 24 — don't let losers bleed
      min_bearish_engulfing: 1.5         # PnL-FIX v3: was 1.2 — stricter pattern
      min_confidence: 0.55               # PnL-FIX v3: was 0.35 — match new min_confidence_threshold
      profit_lock_percentage: 0.01
      trailing_stop_trigger: 0.010          # PnL-FIX v8: was 0.025 — match new global +1.0% activation
      min_engulfing_size_multiplier: 1.2 # PnL-FIX v3: was 0.8 — require ENGULF, not just touch
      regime_aware: true
      require_adx_and_volume_confirmation: true  # PnL-FIX v3: re-enabled
      min_volume_multiplier: 1.5         # PnL-FIX v3: was 0.5 — require volume SPIKE on engulfing
      min_rsi_range: 10                  # PnL-FIX v3: was 5
      sma_period: 50
      stop_loss_pct: 0.015               # PnL-FIX v3: was 0.030
      strict_volume_adx: true            # PnL-FIX v3: re-enabled
      take_profit_pct: 0.030             # PnL-FIX v3: was 0.04
      # Real multi-TF hierarchy: 4h = macro trend, 1h = setup, 15m = entry timing
      target_timeframes:
      - 4h
      - 1h
      - 15m
      timeframe_weights:
        4h: 0.50
        1h: 0.30
        15m: 0.20
      use_atr_for_exits: true
      use_atr_levels: true
      use_volume_confirmation: true      # PnL-FIX v3: re-enabled
      volume_avg_period: 20              # PnL-FIX v3: was 15 — more reliable baseline
      # --- Engulfing-Hybrid v1: spec-compliant additive layers ---
      # Real per-timeframe engulfing scan (replaces the legacy "broadcast" hack
      # that copied the execution-TF pattern across every target TF). When at
      # least `confirmation_timeframes` TFs report bullish engulfing the
      # confidence is nudged up by `multi_tf_confluence_boost * weighted_score`.
      enable_real_multi_tf: true
      multi_tf_confluence_boost: 0.10
      # Volume threshold for the legacy check_entry_signals path. The hot
      # `generate_signal` path still requires the production 1.5x volume spike;
      # this only governs the diagnostic check_entry_signals scan.
      volume_threshold_multiplier: 1.0
      # Spec entry trigger: only enter when the execution-TF close exceeds the
      # engulfing candle's high (+ break_buffer_atr * ATR).
      # Hybrid v1 → ENABLED per user request ("enable all changes"). This is
      # an additional HARD gate on entries — expect lower trade count but
      # higher quality (matches the textbook "wait for the break" rule).
      require_engulfing_break_high: true
      break_buffer_atr: 0.10
      # Spec stop placement: stop = engulfing_low - pattern_stop_buffer_atr * ATR.
      # When enabled, the strategy publishes the hint via state.indicators
      # (`pattern_stop_hint`) so the orchestrator can use it instead of (or as
      # a tighter floor under) the ATR-derived stop.
      # Hybrid v1 → ENABLED per user request ("enable all changes").
      use_pattern_stop: true
      pattern_stop_buffer_atr: 0.25
      # Reversal-mode flips the macro check from "continuation of an uptrend"
      # to "exhaustion of a downtrend" (RSI <= reversal_rsi_oversold OR price
      # stretched >= reversal_stretch_pct below SMA50).
      # Hybrid v1 → ENABLED per user request ("enable all changes"). NOTE:
      # this materially changes live behavior — the strategy will now also
      # accept setups where 4h is exhausted/oversold (textbook reversal).
      # Spot books pay slippage on knife-catches, so monitor PnL and consider
      # tightening adx_entry_threshold / min_confidence in that regime.
      reversal_mode: true
      reversal_rsi_oversold: 35.0
      reversal_stretch_pct: 0.03
      # Wire the existing bearish-engulfing reversal exit into should_exit()
      # so the orchestrator path actually fires it (previously only the
      # diagnostic check_exit_signals branch acted on it, and it was
      # mislabeled as take_profit/stop_loss).
      exit_on_bearish_engulfing: true
    # OPTION-A: regime-driven parameter overrides. Merged on top of `parameters`
    # by BaseStrategy._apply_regime_overrides() at the start of generate_signal().
    # The detected regime already routes this strategy; it now also tunes it.
    # Engulfing pullback-entries work best in reversal_zone & trending_up; are
    # near-useless in trending_down (would be catching falling knives).
    regime_overrides:
      trending_up:
        adx_entry_threshold: 20
        min_confidence: 0.50
        min_engulfing_size_multiplier: 1.0
        min_volume_multiplier: 1.3
        atr_multiplier_tp: 3.5
      trending_down:
        adx_entry_threshold: 50            # effectively vetoes — no pullback longs in downtrend
        min_confidence: 0.95
        confirmation_timeframes: 4
        min_engulfing_size_multiplier: 2.0
      sideways:
        adx_entry_threshold: 28
        min_confidence: 0.65
        min_engulfing_size_multiplier: 1.4
        min_volume_multiplier: 1.8
        confirmation_timeframes: 3
      reversal_zone:                        # engulfing's sweet spot
        adx_entry_threshold: 18
        min_confidence: 0.50
        min_engulfing_size_multiplier: 1.0
        min_volume_multiplier: 1.3
        atr_multiplier_tp: 3.5
      breakout:
        adx_entry_threshold: 22
        min_confidence: 0.55
        min_volume_multiplier: 2.0          # breakout MUST come with volume
        atr_multiplier_tp: 3.0
      high_volatility:
        atr_multiplier_sl: 3.0              # wider stops for vol
        atr_multiplier_tp: 4.0
        min_confidence: 0.60
        max_trade_duration_hours: 8         # don't linger in vol
      low_volatility:
        atr_multiplier_sl: 1.5
        atr_multiplier_tp: 2.5
        min_confidence: 0.50
        min_volume_multiplier: 1.2
  heikin_ashi:
    enabled: false  # PnL-FIX v3 — entry quality > entry quantity
    parameters:
      # TREND DETECTION — restored to crypto-appropriate values.
      # ADX < 20 = ranging market (chop). 22+ filters out the worst whipsaws
      # while still allowing decent throughput.
      adx_period: 14
      adx_threshold: 22  # PnL-FIX v12: back to 22 — chop filter (v6 relaxed to 18 for throughput)
      atr_period: 14
      atr_threshold: 0.004
      # min_trend_strength is now signed (positive = up). The DIRECTION veto
      # (must be > 0) is preserved — only the magnitude is relaxed.
      min_trend_strength: 0.0015  # PnL-FIX v6: was 0.003 — direction-aware veto kept, bar halved
      trend_period: 14
      
      # SLIGHTLY TIGHTER RSI CONDITIONS
      rsi_period: 14
      rsi_overbought: 75
      rsi_oversold: 30
      rsi_buy_threshold: 34  # PnL-FIX v6: was 38 — admit earlier momentum
      rsi_confluence_threshold: 40  # PnL-FIX v6: was 42
      rsi_uptrend_min: 32  # PnL-FIX v6: was 35 — admit earlier uptrend bias
      rsi_uptrend_max: 72  # SLIGHTLY LOWER: Avoid extreme overbought (was 75)
      
      # VOLUME REQUIREMENTS — relaxed (still both checks must pass)
      volume_sma_period: 20
      volume_spike_multiplier: 1.2  # PnL-FIX v6: was 1.5 — sustained 1.2x spike is plenty
      volume_threshold_percentage: 0.20  # PnL-FIX v6: was 0.25
      min_volume: 1500  # SLIGHTLY HIGHER: Better quality (was 1000)
      volume_quality_filter: false
      volume_threshold: 0.6  # SLIGHTLY HIGHER: Mild restriction (was 0.5)
      
      # EMA SETUP — PnL-FIX v12: require price > fast > slow on each TF when enabled
      ema_fast_period: 9
      ema_slow_period: 21
      require_ema_confluence: true
      # PnL-FIX v12: block `macro_buy OR signal_buy` impulse entries where 4h is still HOLD.
      require_macro_buy_vote: true
      # PnL-FIX v12: 4h close must be above 4h EMA(slow) — structural uptrend alignment.
      require_macro_price_above_slow_ema: true
      
      # PRACTICAL RISK MANAGEMENT
      risk_per_trade: 0.015
      # PnL-FIX v7 (SPOT day-trading): 72h was a positional setting and
      # exposed every trade to multiple overnight gaps + weekend risk on
      # spot (no leverage to absorb gaps, no shorts to hedge). 8h ≈ one
      # extended trading session. Orchestrator force-exits after this.
      max_hold_time_hours: 8             # PnL-FIX v7: was 72 — day-trading horizon
      min_candles: 50
      min_candle_size: 0.002  # SLIGHTLY HIGHER: Better quality moves (was 0.001)
      cooldown_after_loss: 1
      
      # CRYPTO-APPROPRIATE ATR LEVELS
      atr_stop_multiplier: 3.5
      atr_take_profit_multiplier: 2.0
      
      # PRIMARY TIMEFRAME used for ad-hoc / fallback analysis
      primary_timeframe: 1h

      # SIGNAL GENERATION
      # PnL-FIX v10 (2026-04-20): raised 0.50 → 0.55 after 7-day review.
      # Heikin Ashi realized -$7.12 / 9 trades (-0.79/trade) with 3 SLs
      # exiting at -3.4% avg (market-sell slippage on illiquid pairs).
      # Tightening entry quality + strategy-wide blacklist of low-liquidity
      # cryptocom small-caps to cut the long tail of quick losers.
      # PnL-FIX v11.2 (2026-04-20): further tightened after today's 4/4 heikin_ashi
      # losers (-$4.36 daily P&L). Previous v10 tightening (0.50 → 0.55) was
      # insufficient — 3/4 of today's losers entered AFTER that tightening.
      # Escalating to 0.65 / 0.70 / 0.55 to reduce entries to the highest-conviction
      # signals only. Expected effect: ~40-60% fewer heikin_ashi trades, but a
      # higher hit rate per trade (target >55% WR).
      min_confidence_score: 0.55         # Hotfix (2026-04-22): restore entry throughput after over-filtering
      require_trend_confirmation: true   # PnL-FIX v3: was false
      avoid_consolidation: true          # PnL-FIX v3: was false
      min_momentum_strength: 0.45        # Hotfix (2026-04-22): reduce false HOLD in early trend acceleration
      max_drawdown_entry: 0.015          # PnL-FIX v10: was 0.020 — tighter entry-timing floor

      # REAL MULTI-TIMEFRAME HIERARCHY (PnL-FIX v3)
      # Previously all 3 levels were 1h, so "confluence" was the same signal × 3.
      # Now: 4h = trend, 1h = setup, 15m = entry timing.
      macro_timeframe: 4h
      signal_timeframe: 1h
      execution_timeframe: 15m
      # Confluence is averaged 0–1; require a meaningful majority across timeframes.
      # PnL-FIX v7: 0.45 was barely majority and let through marginal setups
      # that bled to fees in spot. 0.55 demands that 2 of 3 TFs agree
      # convincingly — the bot's primary edge against transaction costs.
      # PnL-FIX v10 (2026-04-20): raised 0.55 → 0.60 alongside tighter
      # min_confidence_score (0.50 → 0.55). Net effect: fewer entries but
      # forced multi-TF agreement (reduces sideways / one-TF pop traps).
      # PnL-FIX v11.2 (2026-04-20): raised again 0.60 → 0.70 after continued
      # losers. Requires stronger multi-TF consensus to fire.
      min_confluence_score: 0.58         # Hotfix (2026-04-22): require majority confluence without deadlocking entries
      macro_weight: 1.5                  # weight macro trend most heavily
      signal_weight: 1.0
      execution_weight: 0.8

      # PnL-FIX v6: Per-timeframe signal-strength thresholds. Previously these
      # were hardcoded to 0.70 / 0.80 / 0.85 in the strategy, meaning a
      # 4-of-5 hard-veto pass on 15m (strength=0.80) still didn't fire because
      # the execution-TF bar was 0.85. Make them tunable and lower them
      # modestly so quality entries stop being blocked by the noisiest TF.
      # PnL-FIX v10 (2026-04-20): nudged signal/execution bars up by 0.05
      # to match the stricter min_confluence_score (0.55 → 0.60).
      tf_strength_threshold_macro: 0.55      # was 0.70 (4h)
      tf_strength_threshold_signal: 0.62     # Hotfix (2026-04-22): reduce over-rejection on 1h setup
      tf_strength_threshold_execution: 0.65  # Hotfix (2026-04-22): reduce noise-floor lockout on 15m timing
      
      # DISABLED ADVANCED FEATURES (keep it simple)
      enable_rsi_divergence: false  # DISABLED: Too complex
      divergence_lookback: 20
      enable_support_resistance: false  # DISABLED: Too restrictive
      sr_period: 50
      breakout_confirmation_volume: 1.0  # DISABLED: No volume confirmation needed
      phase2_target_rr: 1.5  # LOWER: More achievable targets
      phase3_target_rr: 1.5  # LOWER: More achievable targets

      # HA-Hybrid v1 — true Heikin-Ashi confirmation layer (SOFT signals only).
      # HA candles are computed from raw OHLC and used to nudge signal_strength.
      # SL/TP and hard vetos still operate on raw OHLC + ATR because HA prices
      # are synthetic averages and cannot be used as real stop levels.
      enable_ha_confirmation: true
      ha_min_green_streak: 2              # textbook: 2-3 consecutive green HA candles
      ha_no_lower_wick_tolerance: 0.0001  # |HA_Open - HA_Low| / HA_Open <= tol
      ha_confirmation_boost: 0.10         # additive bump to signal_strength on bullish continuation
      ha_exit_on_color_flip: true         # enable HA-based early exit (gated by RSI floor)
      ha_exit_rsi_floor: 55               # only flip-exit if RSI >= floor (avoid bailing on dips in strong uptrends)

      # HA-Hybrid v1 — MACD confirmation layer (12/26/9 standard, on raw close).
      # Bullish posture (macd>signal AND rising histogram) adds a small boost.
      # A bearish MACD cross combined with an HA color flip triggers an early exit.
      enable_macd_confirmation: true
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      macd_confirmation_boost: 0.05
    # OPTION-A: regime-driven parameter overrides. Heikin-Ashi is a trend-
    # continuation strategy: its edge is strongest in trending_up & breakout,
    # negative in trending_down / reversal_zone / strong sideways chop.
    # The regime detector already routes it; these overrides *tune* it too.
    regime_overrides:
      trending_up:                          # sweet spot — let it breathe
        adx_threshold: 20
        min_trend_strength: 0.0018
        min_confluence_score: 0.62
        min_confidence_score: 0.60
        atr_take_profit_multiplier: 2.5     # ride trends further
        max_hold_time_hours: 8
        volume_spike_multiplier: 1.15
      trending_down:                        # veto — SPOT cannot short a downtrend
        adx_threshold: 40
        min_confidence_score: 0.95
        min_confluence_score: 0.95
        require_ema_confluence: true
      sideways:                             # not its game — strict
        adx_threshold: 20
        min_confluence_score: 0.55
        min_confidence_score: 0.55
        volume_spike_multiplier: 1.2
        atr_take_profit_multiplier: 1.5
        max_hold_time_hours: 4
      reversal_zone:                        # avoid catching knives
        adx_threshold: 25
        min_confidence_score: 0.65
        min_confluence_score: 0.65
        atr_stop_multiplier: 4.0            # wider stop — reversal whipsaws
      breakout:                             # chase if volume confirms
        adx_threshold: 24
        volume_spike_multiplier: 1.8
        min_confidence_score: 0.68
        min_confluence_score: 0.75
        atr_take_profit_multiplier: 2.5
      high_volatility:                      # wider stops, stricter entries
        atr_stop_multiplier: 4.5
        atr_take_profit_multiplier: 2.5
        min_confidence_score: 0.70
        min_confluence_score: 0.65
        max_hold_time_hours: 6
      low_volatility:                       # tighter stops, relax volume
        atr_stop_multiplier: 2.5
        volume_spike_multiplier: 1.0
        min_trend_strength: 0.0010
    target_timeframes:
    - 4h
    - 1h
    - 15m
  multi_timeframe_confluence:
    # PnL-FIX v10 (2026-04-20): DISABLED.
    # Root cause: this strategy is mean-reversion and its spot-mode
    # generate_signal only emits "sell_confluence_signal" (which it cannot act
    # on in spot) and HOLDs otherwise. With `selected_for_regime=primary` on
    # sideways / low_volatility it was winning the weighted-majority vote with
    # weight 1.0 + signal HOLD → every consensus became HOLD. Result: 0 trades
    # in 7 days while analyzing 70 pairs, and BLOCKING other strategies' BUY
    # signals. Re-enable only after a buy-side signal path is added.
    enabled: true  # DISABLED — structurally unable to generate BUY in spot
    parameters:
      adx_threshold: 22  # PnL-FIX v3: was 15 (chop). Restored crypto-trending baseline
      trending_adx_threshold: 25  # LOWERED: More permissive trending (was 30)
      bb_period: 20
      bb_std: 2
      confluence_threshold: 0.40  # MUCH LOWER: Allow easier confluence (was 0.75)
      smart_exit_enabled: true
      long_period: 30
      max_price_range_pct: 25.0
      max_daily_volatility_pct: 12.0
      entry_confirmation_required: false
      max_volume_ratio: 2.5
      medium_period: 15
      min_confluence: 1  # MUCH LOWER: Single confluence OK (was 2)
      required_timeframe_agreement: 1  # MUCH LOWER: Single timeframe OK (was 2)
      min_confidence: 0.35  # LOWERED: Match Heikin Ashi confidence (was 0.75)
      profit_protection_enabled: true
      dynamic_stop_loss: true
      min_sideways_periods: 2  # LOWERED: More opportunities (was 3)
      rsi_overbought: 75
      rsi_oversold: 25
      short_period: 8
      stop_loss_pct: 0.030
      take_profit_pct: 0.08
      vwap_period: 30
      # rolling = N-bar VWAP; session_utc = cumulative from midnight in vwap_session_timezone (bar-based, not exchange tape)
      vwap_mode: rolling
      vwap_session_timezone: UTC
      atr_stop_loss_multiplier: 2.0
      position_size_percentage: 0.10
      max_position_size_usd: 100
      position_size_multiplier: 2.0
      enable_trending_trades: true
      min_market_stability: 0.50  # MUCH LOWER: Very permissive (was 0.70)
      avoid_high_volatility: false
      max_daily_range: 0.20
      require_volume_confirmation: false
      min_rsi_divergence: 3  # LOWERED: Easier to meet (was 5)
      cooldown_after_loss_hours: 2  # MUCH SHORTER: Faster recovery (was 6)
    # OPTION-A: regime-driven parameter overrides. Multi-TF confluence is a
    # mean-reversion / range strategy — its edge is strongest in SIDEWAYS,
    # REVERSAL_ZONE and LOW_VOLATILITY; should stand aside in trending_down.
    regime_overrides:
      sideways:                             # sweet spot — loosen further
        min_confluence: 1
        min_confidence: 0.30
        adx_threshold: 18
        max_volume_ratio: 3.0
        required_timeframe_agreement: 1
        take_profit_pct: 0.06
      trending_up:                          # allow but tighten
        min_confluence: 2
        min_confidence: 0.45
        trending_adx_threshold: 22
        rsi_oversold: 35                    # buy higher pullbacks
        take_profit_pct: 0.08
      trending_down:                        # effective veto
        min_confluence: 10
        min_confidence: 0.95
      reversal_zone:                        # mean-reversion sweet spot
        min_confluence: 2
        min_confidence: 0.40
        rsi_oversold: 28
        rsi_overbought: 72
        take_profit_pct: 0.05
      breakout:                             # not its strength — high bar
        min_confluence: 3
        min_confidence: 0.55
        max_daily_volatility_pct: 18.0
      high_volatility:
        min_confluence: 3
        min_confidence: 0.55
        max_daily_volatility_pct: 15.0
        atr_stop_loss_multiplier: 2.5
      low_volatility:                       # mean reversion works well here
        min_confluence: 1
        min_confidence: 0.30
        max_volume_ratio: 3.5
        take_profit_pct: 0.05
    target_timeframes:
    - 1h
    - 15m
  strategy_pnl_enhanced:
    enabled: false  # This is a utility module, not a strategy class
    parameters:
      atr_period: 14
      dynamic_stop_loss: true
      volatility_multiplier: 1.2
      min_confidence: 0.8
    target_timeframes:
    - 1h
    - 15m
  macd_momentum:
    enabled: true
    parameters:
      # Execution MACD (15m): aligned with exchange default profile (12/26/9).
      execution_fast_period: 12
      execution_slow_period: 26
      execution_signal_period: 9
      # Trend MACD (1h): slower bias when long_macd_bias_timeframe / short_macd_bias_timeframe is "trend".
      trend_fast_period: 12
      trend_slow_period: 26
      trend_signal_period: 9
      # Buy/sell bias: "execution" = 15m MACD vs signal; "trend" = 1h MACD vs signal.
      # PnL-FIX v13: longs require 1h MACD > signal — avoids 15m-only impulse longs into 1h rollover.
      long_macd_bias_timeframe: trend
      short_macd_bias_timeframe: execution
      ema_filter_period: 20
      volume_window: 20
      volume_multiplier: 1.14
      use_volume_confirmation: true
      dynamic_volume_enabled: true
      dynamic_volume_floor: 1.05
      dynamic_volume_ceiling: 1.15
      histogram_min_delta: 0.0
      min_confidence_score: 0.55
      adx_period: 14
      # PnL-FIX v13: enforced as hard gate when enforce_adx_threshold is true (was boost-only).
      adx_threshold: 18
      adx_boost_threshold: 20
      enforce_adx_threshold: true
      adx_confidence_boost: 0.06
      skip_sideways_regime: false
      min_hist_rising_bars: 2
      min_hist_falling_bars: 2
      require_hist_positive_for_long: true
      require_hist_negative_for_short: true
      enable_divergence_detection: true
      divergence_lookback: 12
      divergence_confidence_boost: 0.05
      # Hard rule requested: if MACD condition passes, force BUY path.
      macd_green_rsi_force_buy_override: true
      macd_green_rsi_buy_threshold: 35
      macd_green_rsi_lookback: 10
    # Regime tuning: keep buy participation in bullish/high-momentum regimes,
    # but effectively stand down for SPOT longs in trending_down.
    regime_overrides:
      trending_up:
        volume_multiplier: 1.05
        min_confidence_score: 0.50
      trending_down:
        min_confidence_score: 0.95
        adx_threshold: 20
      breakout:
        execution_fast_period: 12
        execution_slow_period: 26
        execution_signal_period: 9
        volume_multiplier: 1.15
        min_confidence_score: 0.50
      high_volatility:
        execution_fast_period: 12
        execution_slow_period: 26
        execution_signal_period: 9
        adx_threshold: 16
      low_volatility:
        execution_fast_period: 12
        execution_slow_period: 26
        execution_signal_period: 9
        volume_multiplier: 1.05
    target_timeframes:
    - 1h
    - 15m
  rsi_oversold_override:
    enabled: false
    parameters:
      # Independent override strategy (15m trigger + 1h safety guards):
      # - Base trigger: 15m RSI oversold.
      # - Guard rails: reclaim cross, price > EMA20, 1h MACD bias, regime blocks.
      # - Does not participate in weighted consensus voting.
      # - Consensus engine can still force BUY on this signal.
      rsi_period: 14
      rsi_buy_threshold: 25.0
      require_reclaim_cross: true
      reclaim_lookback_bars: 1
      require_price_above_ema20: true
      ema_filter_period: 20
      require_trend_macd_bias: true
      trend_fast_period: 12
      trend_slow_period: 26
      trend_signal_period: 9
      require_trend_rsi_floor: false
      trend_rsi_floor: 40.0
      blocked_regimes:
      - trending_down
      - high_volatility
      buy_confidence: 0.95
      buy_strength: 0.90
    target_timeframes:
    - 15m
  rsi_oversold_checklist:
    enabled: true
    parameters:
      # Stricter profile: the previous "simple band only" mode (reclaim off + no recent
      # touch) stayed BUY for every bar while RSI sat in a wide band → many pairs opened
      # at once. Reclaim + structure filters require an actual oversold dip and bounce.
      require_price_above_ema20: true
      reclaim_cross_bars: 2
      require_rsi_reclaim: true
      require_simple_recent_touch: false
      simple_oversold_rsi_max: 48
      simple_oversold_lookback_bars: 24
      simple_touch_rsi_max: 42
      rsi_period: 14
      rsi_reclaim_level: 30.0
      dynamic_reclaim_by_regime: true
      reclaim_by_regime:
        sideways: 28.0
        ranging: 30.0
        trending: 25.0
        volatile: 22.0
      exec_rsi_min: 26.0
      exec_rsi_max: 52.0
      trend_rsi_min: 38.0
      ema_fast_period: 20
      ema_mid_period: 50
      ema_slow_period: 200
      volume_window: 20
      volume_multiplier: 1.06
      support_lookback: 30
      support_tolerance_pct: 0.012
      divergence_lookback: 14
      require_volume_confirmation: true
      require_support_proximity: false
      require_bullish_divergence: false
      require_multi_tf_rsi: true
      require_macro_trend_filter: true
      support_confidence_boost: 0.02
      support_strength_boost: 0.02
      divergence_confidence_boost: 0.03
      divergence_strength_boost: 0.03
      max_confidence_cap: 0.99
      max_strength_cap: 0.99
      rsi_slope_bars_ago: 2
      require_rsi_slope: false
      rsi_slope_confidence_boost: 0.015
      rsi_slope_strength_boost: 0.015
      buy_confidence: 0.97
      buy_strength: 0.92
    target_timeframes:
    - 15m
    - 1h
  vwma_hull:
    # PnL-FIX v3 — Added ADX>=22 + 4h macro-trend HARD VETOS in strategy code.
    # PnL-FIX v6 — Lower-bar mode: relax soft-quality filters but KEEP both
    # directional vetos (ADX>=22 in code, 4h EMA9>EMA21 macro veto). All
    # entry-direction safeguards remain on; only redundant "AND" gates that
    # were producing 0 trades in normal markets get loosened.
    enabled: false
    parameters:
      atr_period: 14
      atr_threshold: 0.002               # PnL-FIX v3: was 0.001
      crossover_confidence_boost: 0.60   # PnL-FIX v3: was 0.50
      hull_period: 14
      min_absolute_volume: 1500          # PnL-FIX v6: was 3000 — still excludes truly illiquid pairs
      min_price_move: 0.001              # PnL-FIX v6: was 0.002 — was filtering normal quiet bars
      min_volatility_threshold: 0.003    # PnL-FIX v6: was 0.005 — restored v2 baseline
      scalping_enabled: false
      strength_multiplier: 20
      trend_confidence_boost: 0.70       # PnL-FIX v3: was 0.50
      trend_threshold: 0.005             # PnL-FIX v6: was 0.010 — 0.5% VWMA/Hull separation suffices
      volatility_adjustment: true
      volume_method: adaptive
      volume_percentile: 0.15            # PnL-FIX v6: was 0.25 — restored v2 baseline
      volume_threshold: 1.0              # PnL-FIX v6: was 1.2
      profit_target_multiplier: 2.0      # PnL-FIX v3: was 1.5 — 1:2 R:R
      volume_window: 20                  # PnL-FIX v3: was 15
      vwma_period: 15                    # PnL-FIX v3: was 12 — less noise
      min_confidence_score: 0.55         # PnL-FIX v10: was 0.50 — tighter floor after -$0.51 / 23 trades (~break-even, net negative after fees)
      # PnL-FIX v7 (SPOT day-trading): restored. Spot breakouts without
      # volume confirmation are the #1 false-signal source (price spike
      # with no participation = thin order book = slippage on fill +
      # immediate reversion). Worth the slightly lower trade count.
      require_volume_breakout: true      # PnL-FIX v7: was false (v6) — restored
      avoid_range_bound_markets: true    # KEEP — chop avoidance
      min_trend_duration: 3              # PnL-FIX v6: was 5 — original baseline
      max_rsi_entry: 68                  # KEEP — avoid buying tops
      min_rsi_entry: 40                  # KEEP — momentum floor
      require_price_momentum: false      # PnL-FIX v6: was true — already gated by min_price_move + ADX
      stop_loss_atr_multiplier: 2.0
      require_multi_timeframe_confirmation: true  # KEEP — 4h macro veto (DIRECTIONAL)
      min_breakout_strength: 0.005       # PnL-FIX v6: was 0.010
      max_recent_drawdown: 0.020         # KEEP — drawdown guard
      require_increasing_volume_trend: false      # PnL-FIX v6: was true — over-filtering
      min_bullish_candles_sequence: 1    # PnL-FIX v6: was 2 — original baseline

      # VWMA-Hull-Hybrid v1 — exposed knobs (all SOFT signals; never vetos).
      # The hard ADX gate (was hard-coded to 22) is now configurable here.
      adx_period: 14                     # ADX length used by the hard veto + soft gates
      adx_threshold: 22                  # PnL-FIX v3 default kept

      # Canonical single-line VWMAHull indicator (spec compliant):
      #   vwma_half = VWMA(close, vol, n/2)
      #   vwma_full = VWMA(close, vol, n)
      #   raw       = 2*vwma_half - vwma_full
      #   vwma_hull = WMA(raw, int(sqrt(n)))
      # When enabled, `close > vwma_hull` adds vwma_hull_boost to confidence/strength
      # (and a symmetric penalty when `close < vwma_hull` on long signals).
      enable_canonical_vwma_hull: true
      vwma_hull_boost: 0.10

      # HMA slope confirmation: Hull(VWMA) rising last bar => add hma_slope_boost
      # to a long signal; falling => penalty. Same for shorts (mirrored).
      hma_slope_boost: 0.05

      # Spec: pair with RSI(14) > 50 for longs. Symmetric ceiling for shorts.
      rsi_period_long: 14
      rsi_long_floor: 50
      rsi_short_ceiling: 50
      rsi_boost: 0.05
    # OPTION-A: regime-driven parameter overrides. VWMA-Hull is a volume-
    # weighted trend-following strategy: edge concentrated in trending_up &
    # breakout (with volume); effectively neutralised in trending_down.
    regime_overrides:
      trending_up:                          # relax — we want participation
        trend_threshold: 0.003
        volume_percentile: 0.10
        crossover_confidence_boost: 0.80
        trend_confidence_boost: 0.85
        min_confidence_score: 0.45
      trending_down:                        # effective veto for SPOT longs
        trend_threshold: 0.100              # ~impossible to hit
        volume_percentile: 0.95
        crossover_confidence_boost: 0.10
        trend_confidence_boost: 0.10
        min_confidence_score: 0.95
      sideways:                             # chop — tighter
        trend_threshold: 0.010
        volume_percentile: 0.25
        min_volatility_threshold: 0.005
        crossover_confidence_boost: 0.40
        min_confidence_score: 0.60
      reversal_zone:                        # not its strength
        trend_threshold: 0.015
        volume_percentile: 0.30
        crossover_confidence_boost: 0.30
        min_confidence_score: 0.65
      breakout:                             # sweet spot — demand volume
        trend_threshold: 0.003
        volume_percentile: 0.08
        crossover_confidence_boost: 0.85
        trend_confidence_boost: 0.85
        require_volume_breakout: true
        min_confidence_score: 0.45
      high_volatility:                      # stricter volume floor
        min_volatility_threshold: 0.005
        min_absolute_volume: 3000
        trend_threshold: 0.008
        min_confidence_score: 0.55
      low_volatility:                       # relax participation gates
        min_volatility_threshold: 0.002
        min_price_move: 0.0005
        volume_percentile: 0.15
        min_confidence_score: 0.50
    # Real multi-TF hierarchy
    target_timeframes:
    - 4h
    - 1h
    - 15m
strategy_manager:
  analysis_timeout: 30
  max_concurrent_analyses: 10
  signal_cache_duration: 300
trading:
  # PnL-FIX v3 — concurrency limits
  # Previously 150 → 32 concurrent correlated longs were a single big crypto-long bet,
  # not 32 independent trades. Hard-cap concurrency to a real diversification budget.
  max_concurrent_trades: 12  # PnL-FIX v3: was 150
  # PnL-FIX v5 — Emergency kill-switches were tripping immediately on a clean
  # slate. The previous values (0.2% daily loss, 1 consecutive loss, 90% win
  # rate, 1% total loss) were panic settings while the strategy bugs were
  # being patched. Now that the v3/v4/v5 strategy fixes are in, restore
  # statistically-meaningful thresholds so a normal ‑1R drawdown can't
  # freeze the entire bot.
  max_daily_loss: 0.030             # PnL-FIX v5: was 0.002 — 3% daily loss cap (≈ realistic 1-day worst case)
  max_daily_trades: 100
  win_rate_threshold: 0.40          # PnL-FIX v5: was 0.90 — kill-switch only on chronic <40% win rate
  consecutive_loss_limit: 5         # PnL-FIX v5: was 1 — 5 in a row signals real strategy drift, not noise
  min_confidence_threshold: 0.45    # PnL-FIX v3: was 0.30 — match higher signal quality
  max_total_loss: 0.10              # PnL-FIX v5: was 0.01 — 10% account drawdown is the actual stop-the-bot line
  max_trades_per_exchange: 15       # was 5 — higher per-venue cap while max_concurrent_trades caps total risk

  # PnL-FIX v3 — Per-pair cooldown + correlation cap (enforced by orchestrator)
  # `pair_cooldown_minutes`: minimum minutes between consecutive entries on the
  # same pair. Prevents the bot from stacking correlated longs on the same pair
  # within a single cycle (root cause of the 32-concurrent-losers episode).
  # `correlation_basket_cap`: max concurrent longs on USD/USDT/USDC-quoted pairs
  # per exchange (enforced by orchestrator).
  # Since crypto longs correlate >0.8, treating them as one basket is realistic.
  pair_cooldown_minutes: 45
  # Global cross-exchange cooldown for the same normalized pair.
  # Example: DOGE/USDC opened on bybit blocks DOGE/USDC entries on binance/cryptocom for 5 minutes.
  global_pair_cooldown_minutes: 5
  # Block stacking: do not open this pair on any exchange while any OPEN row for the same
  # normalized pair (any venue) has unrealized_pnl < 0 (prevents twin AIXBT-style loads).
  block_new_entry_if_open_unrealized_negative: true
  # Hard guard: if this pair closed with realized loss in the last N hours, block re-entry.
  block_pair_after_negative_realized_enabled: true
  block_pair_after_negative_realized_hours: 12
  # Block new entries when latest close on pair has realized PnL% below this threshold.
  # Example 0.5 => blacklist on losses and small gains below +0.5%.
  block_pair_after_realized_pnl_below_pct: 0.5
  # Allow stacking same pair only when currently open legs are above this uPnL% threshold.
  # Example 0.5 => block new entries if any open same-pair leg is <= +0.5%.
  block_new_entry_if_open_unrealized_below_pct: 0.5
  # Max concurrent OPEN rows per (exchange, pair); block a 3rd entry when already at cap.
  max_open_trades_per_pair: 1
  # Hard safety override: always block if there is already >=1 active trade on same pair.
  # Keeps protection even if config-service still serves max_open_trades_per_pair=2.
  force_single_open_per_pair: true
  # Block new entries only after this many underwater opens on the same pair (Layer 1).
  pair_risk_layer1_min_negative_positions_to_block: 2
  # Block new entries when combined loss-shaped events (open loss + closed loss in 2h) reach this count (Layer 2).
  pair_risk_layer2_min_loss_events: 2
  # Apply extended post-exit cooldown only after this many consecutive realized-loss closes.
  pair_consecutive_losses_for_extended_cooldown: 2
  pair_loss_extended_cooldown_minutes: 90
  correlation_basket_cap: 12
  # Monthly realized PnL goal (USD) for /monthly-profit dashboard
  monthly_profit_target_usd: 1000
  min_exchange_balance: 50.0
  # PnL-FIX v13 (2026-05): raise floor so typical spot notionals are not "fee-dominated"
  # (min fixed fee / small $80–$100 orders → net-red exits even with a green tick).
  # Measured rule of thumb: keep min order high enough that 2× taker% + slippage is
  # a small fraction of the expected MFE; pair with breakeven_floor + activation below.
  min_order_size_usd:
    cryptocom: 120.0
    binance: 120.0
    bybit: 120.0
    default: 120.0
  default_min_order_amount: 0.001  # Fallback minimum order amount in crypto units (INCREASED: Prevent micro-orders)
  sanitization:
    prevent_zero_rounding: true
    min_crypto_precision: 8
    max_crypto_precision: 12
  risk_reward_minimum: 2.0
  mode: simulation
  # PnL-FIX v9 — Simulation accounting (single source of truth)
  # The dashboard's per-exchange balance is now DERIVED from these values
  # plus SUM(realized_pnl) per exchange, eliminating dual-ledger drift.
  # `fee_rate_per_side` is applied uniformly on every simulated entry AND exit.
  # Aligned with `profit_protection.estimated_entry_fee` / `estimated_exit_fee` (0.1% per side)
  # so sim PnL matches the same "measured" taker assumption as fee-aware protection logic.
  simulation:
    starting_balance_per_exchange_usd: 2000.0
    fee_rate_per_side: 0.001
  # PnL-FIX v5 — Position-sizer diversification overcap.
  # Hard ceiling on a single position relative to the equal-weight slot budget
  # (= available_balance / remaining_slots). 1.5 = at most 50% above equal
  # weight. Combined with `max_trades_per_exchange: 10` this prevents any
  # single trade from blowing through the diversification budget the way the
  # API3/USD trade did before this fix.
  per_slot_diversification_overcap: 1.5
  position_size_percentage: 0.1  # Restored to original value
  strategy_position_sizing:
    enabled: true
    multi_timeframe_confluence:
      # PnL-FIX v5 — was 0.25 / $1000. With 10 slots per venue at $2k balance
      # that allowed a single MTF trade to claim >70% of free capital
      # (e.g. API3/USD ≈ $2,333 on $9k). The diversification overcap will
      # still ceiling this, but tightening the per-strategy values too means
      # MTF can only be the *largest* slot, not a market-bet replacement.
      position_size_percentage: 0.15
      max_position_usd: 400
      priority: high
    engulfing_multi_tf:
      position_size_percentage: 0.10  # PnL-FIX v5: was 0.12
      max_position_usd: 300            # PnL-FIX v5: was 500
      priority: medium
    heikin_ashi:
      position_size_percentage: 0.10
      max_position_usd: 300            # PnL-FIX v5: was 400 — equal-weight slot ceiling
      priority: medium
    vwma_hull:
      position_size_percentage: 0.10
      max_position_usd: 300            # PnL-FIX v5: was 400
      priority: medium
    default:
      position_size_percentage: 0.08
      max_position_usd: 250            # PnL-FIX v5: was 300
      priority: low
  profit_protection:
    # PnL-FIX v3: was false. Re-enabled so partial exits at +0.8/+1.3/+1.8/+2.3% lock
    # gains incrementally instead of relying solely on the trailing stop.
    enabled: true
    fee_aware: true  # NEW: Enable fee-aware profit calculations
    estimated_entry_fee: 0.001  # NEW: 0.1% entry fee
    estimated_exit_fee: 0.001   # NEW: 0.1% exit fee
    estimated_partial_exit_fee: 0.001  # NEW: 0.1% per partial exit
    lock_percentage: 0.018  # CRITICAL: Increased to 1.8% - account for fees
    partial_exit_percentage: 80
    # PnL-FIX v12 (2026-05): +0.50% peak arms PP (was +0.80%). Median trade MFE in
    # recent samples sits near +0.8%; lowering captures modest green peaks that
    # often give back, while breakeven_floor on trailing_stop still clamps locks
    # above round-trip fees. (Legacy trigger_percentage removed — orchestrator
    # uses activation_threshold only.)
    activation_threshold: 0.005
    max_drawdown: 0.15  # Reduced from 0.2 for tighter protection
    consecutive_threshold: 3  # Reduced from 4 for faster response
    significant_decrease_multiplier: 0.0008  # Reduced from 0.001 for tighter protection
    # NEW: Fee-aware profit guarantee settings
    partial_exit_levels: [0.008, 0.013, 0.018, 0.023]  # CRITICAL: Fee-adjusted levels (0.8%, 1.3%, 1.8%, 2.3%)
    partial_exit_sizes: [0.3, 0.3, 0.2, 0.2]  # Exit 30%, 30%, 20%, 20% at each level
    guaranteed_min_profit: 0.006  # CRITICAL: 0.6% guaranteed net profit after fees
    break_even_plus: 0.005  # CRITICAL: 0.5% net profit after fees
  # PnL-FIX v3 — Risk: tighter stop; winners are managed by trailing_stop / profit protection (no global fixed TP %).
  # Old config: SL 3.0% vs trailing activation 0.5% = avg loser $12 vs avg winner $4 (1:0.33).
  stop_loss_percentage: 0.015   # PnL-FIX v3: was 0.030 (3% → 1.5%)
  # Hard cap: market exit when mark PnL% >= this (decimal, 0.045 = +4.5%). Set to 0 to disable.
  overall_profit_take_exit_pct: 0.045
  min_confidence_threshold: 0.50  # Hotfix (2026-04-22): allow valid lower-confidence trend entries
  # Critical safety (2026-05-07): do not allow strategy overrides to execute BUY
  # while consensus is HOLD/SELL unless explicitly enabled.
  # Keep generic forced overrides disabled by default; MACD override is enforced in orchestrator.
  allow_forced_buy_overrides: false
  # Reject stale strategy snapshots in orchestrator before trade execution.
  max_signal_age_seconds: 90
  entry_quality_gate:
    enabled: true
    min_consensus_confidence: 0.45
    min_agreement_percentage: 50.0
    min_buy_strategies: 1
    min_avg_buy_strength: 0.35
    max_spread_percentage: 0.45
  consensus_buy_fallback:
    enabled: true
    min_buy_strategy_confidence: 0.60
    min_buy_strategy_strength: 0.08
    max_sell_signals: 1
  macd_buy_override:
    enabled: true
  adaptive_position_sizing:
    enabled: true
    lookback_trades: 20
    consecutive_loss_threshold: 2
    reduced_size_multiplier: 0.35
    min_size_multiplier: 0.25
  stagnant_loser:
    min_age_minutes: 30
    peak_cap_pct: 0.30
    loss_trigger_pct: -0.80
    volatility_reference_pct: 0.80
    peak_cap_slope: 0.40
    loss_trigger_slope: 0.50
    min_age_floor_minutes: 20
    min_age_ceiling_minutes: 60
  execution_slippage:
    alert_threshold_bps: 35
    downgrade_threshold_bps: 60
    downgrade_cooldown_minutes: 120
  regime_policies:
    policy_version: "2026-04-21-v1"
    mode: "shadow"   # shadow | enforce | calibrate
    defaults:
      entry:
        min_consensus_confidence: 0.45
        min_agreement_percentage: 50.0
        min_buy_strategies: 1
        min_avg_buy_strength: 0.35
        max_spread_percentage: 0.45
        min_confidence_threshold: 0.50
      consensus:
        primary_override_threshold: 0.58
        sell_veto_threshold: 0.60
      sizing:
        multiplier: 1.00
        reduced_size_multiplier: 0.35
        min_size_multiplier: 0.25
        consecutive_loss_threshold: 2
      exits:
        stagnant_loser:
          min_age_minutes: 30
          peak_cap_pct: 0.30
          loss_trigger_pct: -0.80
          volatility_reference_pct: 0.80
          peak_cap_slope: 0.40
          loss_trigger_slope: 0.50
          min_age_floor_minutes: 20
          min_age_ceiling_minutes: 60
        execution_slippage:
          alert_threshold_bps: 35
          downgrade_threshold_bps: 60
          downgrade_cooldown_minutes: 120
    trending_up:
      entry:
        min_consensus_confidence: 0.50
        min_agreement_percentage: 58.0
      sizing:
        multiplier: 1.10
    trending_down:
      entry:
        min_consensus_confidence: 0.70
        min_agreement_percentage: 75.0
        max_spread_percentage: 0.28
      sizing:
        multiplier: 0.70
      exits:
        stagnant_loser:
          min_age_minutes: 22
          loss_trigger_pct: -0.65
    sideways:
      entry:
        min_consensus_confidence: 0.52
        min_agreement_percentage: 56.0
        min_avg_buy_strength: 0.40
    breakout:
      entry:
        min_consensus_confidence: 0.56
        min_agreement_percentage: 62.0
        max_spread_percentage: 0.30
      sizing:
        multiplier: 0.90
    high_volatility:
      entry:
        min_consensus_confidence: 0.58
        min_agreement_percentage: 62.0
        min_buy_strategies: 1
        max_spread_percentage: 0.25
      sizing:
        multiplier: 0.60
        reduced_size_multiplier: 0.30
      exits:
        stagnant_loser:
          min_age_minutes: 20
          peak_cap_pct: 0.45
          loss_trigger_pct: -0.60
          min_age_floor_minutes: 12
          min_age_ceiling_minutes: 45
        execution_slippage:
          alert_threshold_bps: 28
          downgrade_threshold_bps: 45
          downgrade_cooldown_minutes: 180
    low_volatility:
      entry:
        min_consensus_confidence: 0.50
        min_agreement_percentage: 55.0
        min_avg_buy_strength: 0.45
      sizing:
        multiplier: 0.85
    reversal_zone:
      entry:
        min_consensus_confidence: 0.60
        min_agreement_percentage: 62.0
        min_buy_strategies: 2
      sizing:
        multiplier: 0.75
  max_daily_loss_per_exchange: 0.05
  dynamic_stop_loss_enabled: true
  pair_rotation:
    remove_pair_loss_threshold_pct: -1.0  # Remove/replace pair when realized exit PnL <= -1.0%
    # Hard entry gate: block NEW entries for temp_blacklist_cooldown_hours after a losing close.
    # 0.0 = any strict loss (realized PnL%% < 0). Set to -1.0 to only block after losses as bad as remove_pair_loss_threshold_pct.
    hard_entry_cooldown_loss_pct_threshold: 0.0
    temp_blacklist_cooldown_hours: 12     # Keep removed pairs out for 12h before reselection
    scan_recent_closed_limit: 2000        # Safety-net scan size for closed trades (captures sync/fallback closures under high volume)
  trailing_stop:
    enabled: true
    # PnL-FIX v8 (F1+F2+F3) — observed live data:
    #   trade 85687132 BLUR/USDC: peak +2.38%, exit +0.20% (gave back 2.18%)
    #     → activation@2.5% NEVER ARMED because peak fell short by 0.12%.
    #   trades ARC/API3/AAVE: peak == entry (0.00%) → never armed → full SL.
    # Solution: arm at +1.0% (still > round-trip taker 0.30% + slippage
    # budget), tighten callback to 0.6% so we don't give back 1.2% of a
    # winner, and add a HARD safety floor that ensures any active trail
    # exits at MINIMUM +0.30% net of fees (was hardcoded +0.10% in code).
    step_percentage: 0.0045             # Base trailing distance: 0.45% callback (allows ~0.70% peaks to arm trail with 0.25% floor)
    dynamic_tightening_enabled: true    # Tighten trail after sufficient profit
    tighten_profit_threshold: 0.009     # Tighten once peak PnL exceeds +0.90%
    tightened_step_percentage: 0.0035   # Tightened trailing distance: 0.35%
    # PnL-FIX v13 (2026-05): activation must sit *above* breakeven_floor so the trail
    # only arms after there is room to lock a price above entry+fees. With
    # `profit_protection.estimated_*_fee` = 0.1% per leg, round-trip ≈ 0.20% + slippage;
    # use +0.50% peak to arm (matches profit_protection.activation_threshold).
    activation_threshold: 0.005
    max_trail_distance: 0.0035          # (currently unused)
    min_trigger_distance_percentage: 0.006  # PnL-FIX v8 (F2): align with new step_percentage
    # PnL-FIX v13 (2026-05): floor tuned to *measured fee model* in profit_protection
    # (0.1% entry + 0.1% exit = 0.20% of notional, proportional) plus ~0.25% cushion for
    # spread/min-fee reality on small caps — NOT below round-trip fee %.
    breakeven_floor_percentage: 0.0045  # +0.45% minimum lock above entry (price space)
    # PnL-FIX v8 (Q1+Q2+Q3): tighter tick handling for the trail-stop manager.
    #   check_interval_seconds: how often the polling loop scans active stops
    #     (used as a safety-net on top of the new event-driven WS callback).
    #   update_threshold: minimum *fraction* improvement above the current
    #     trail price required to actually re-issue the limit order. Lowered
    #     from 0.001 (0.10%) to 0.0003 (0.03%) so micro-pumps ratchet the
    #     trail instead of being silently filtered out.
    #   event_driven_enabled: when true, TrailingStopManager subscribes to
    #     the WebSocket price feed and ratchets on every tick — eliminating
    #     the polling gap entirely. The polling loop remains as a safety net.
    check_interval_seconds: 2           # PnL-FIX v8 (Q1): was 5 (hardcoded default)
    update_threshold: 0.0003            # PnL-FIX v8 (Q2): was 0.001 (0.10% → 0.03%)
    event_driven_enabled: true          # PnL-FIX v8 (Q3): subscribe to WS price feed
    # Trigger-time execution reliability policy.
    # GOOD: normal operation
    # DEGRADED: fallback sources are available; allow constrained protective exits
    # DOWN: synthetic fallback only; allow emergency exits after escalation delay
    feed_quality_policy:
      degraded_sources: ["ohlcv_1m", "orderbook_mid"]
      down_sources: ["entry_fallback"]
      allow_exit_in_degraded: true
      allow_exit_in_down: true
      down_escalation_seconds: 10
    high_price_pair_threshold: 1000
  fee_optimization:
    use_limit_orders: true
    max_taker_fee: 0.0015
    prefer_maker_orders: true
    limit_order_spread: 0.00001
    fee_alert_threshold: 0.002
    fee_to_pnl_ratio_limit: 0.25
    order_timeout_seconds: 90   # PnL-FIX v3: was 300 — fail fast & retry with market fallback
    max_retry_attempts: 2
    min_spread_for_limit: 0.00001
    volatility_threshold: 0.015
  order_management:
    # PnL-FIX v3 — Limit-order timeout drastically reduced (was 300s).
    # Today's database showed 5,379 trades stuck in PENDING and auto-cleaned at the
    # 60-min mark. With a 90-second timeout the orchestrator can cancel the unfilled
    # limit order and retry as a marketable-limit before the opportunity is gone.
    limit_order_timeout_seconds: 90
    order_sync_interval_seconds: 15
    max_cancellation_retries: 5
    cancellation_retry_delay: 3
    competitive_pricing_enabled: true
    competitive_pricing_buffer: 0.0005   # PnL-FIX v3: was 0.0001 — wider so limits actually fill
    stale_order_cleanup_hours: 1         # PnL-FIX v3: was 12 — match new short timeout
    order_status_cache_seconds: 30  # CRITICAL: Shorter cache time for faster updates
    performance_calculation_interval: 180  # CRITICAL: More frequent performance checks
    performance_history_days: 30
    alert_on_low_success_rate: true
    low_success_rate_threshold: 0.3  # CRITICAL: Alert if success rate below 30%
    alert_on_high_timeout_rate: true
    high_timeout_rate_threshold: 0.4  # CRITICAL: Alert if timeout rate above 40%
    # CRITICAL: Enhanced sync reliability settings
    sync_retry_attempts: 3
    sync_retry_delay: 5
    websocket_fallback_enabled: true
    polling_fallback_interval: 60
    fill_detection_timeout: 300
    order_validation_enabled: true
    # CRITICAL: Monitoring for order sync failures
    monitor_sync_failures: true
    max_consecutive_sync_failures: 3
    sync_failure_alert_threshold: 2
    # CRITICAL: Exit order fill detection monitoring
    monitor_exit_order_failures: true
    exit_order_check_interval: 60
    auto_fix_stuck_trades: true
    exit_order_alert_threshold: 1
  test_mode:
    enabled: false
    test_price_service_url: "http://test-price-service:8008"
    default_override_duration_minutes: 60
    allow_production_override: false
    logging_enabled: true
trading_manager:
  # PnL-FIX v8 (Q4): full exit cycle now runs every 30s (was 60s) so SL,
  # max-hold, TP-target and profit_protection arming evaluations happen
  # twice as often. The trail-ratchet itself is now event-driven via the
  # WS price callback (see trading.trailing_stop.event_driven_enabled), so
  # this faster cycle is purely defense-in-depth for non-trail exits.
  cycle_interval_seconds: 30          # PnL-FIX v8 (Q4): was 60
  exit_cycle_first: true
  # Full-loop wall clock: exit is timeboxed to (max_cycle_duration - entry_loop_reserve_seconds),
  # then entry (strategy /signals) + maintenance run until max_cycle_duration.
  max_cycle_duration: 240
  # Seconds kept on the clock for entry + maintenance after exit's timebox (strategy calls).
  entry_loop_reserve_seconds: 90
  # Exit cycle: every open trade each loop — parallel checks + parallel price prefetch (Redis WS mirror + ticker-live).
  exit_check_concurrency: 16
  exit_price_prefetch_concurrency: 48
web_ui:
  debug: false
  host: 0.0.0.0
  port: 8000
  refresh_interval_seconds: 5
realtime:
  enable_websocket_prices: false
  stale_price_threshold_seconds: 30
  rest_poll_interval_seconds: 1
  ws:
    reconnect_backoff_seconds:
    - 1
    - 2
    - 5
    - 10
    - 30
    heartbeat_interval_seconds: 20
    max_concurrent_subscriptions_per_exchange: 50
    subscribe_only_for_open_trades: false
    exchanges:
      binance:
        enable: true
      bybit:
        enable: true
      cryptocom:
        enable: true
